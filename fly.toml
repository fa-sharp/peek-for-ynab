app = "peek-for-ynab-v2"
primary_region = "ewr"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[statics]]
guest_path = "/app/dist/client/_astro"
url_prefix = "/_astro"

[[vm]]
memory = "256mb"
cpu_kind = "shared"
cpus = 1
