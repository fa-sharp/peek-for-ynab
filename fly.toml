app = "peek-for-ynab"
primary_region = "ewr"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "8080"
REQUEST_ID_HEADER = "Fly-Request-Id"
TRUST_PROXY = "true"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "suspend"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[vm]]
memory = "256mb"
cpu_kind = "shared"
cpus = 1
memory_mb = 256
