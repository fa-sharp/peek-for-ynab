name: Backend/Web
on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "Dockerfile"
      - "fly.toml"
jobs:
  deploy:
    name: Deploy server
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
